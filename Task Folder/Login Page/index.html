<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="box">

        <div class="top">
            <h1>Welcome Back</h1>
            <p id="p1">Login to your account</p>
        </div>
        <div class="input">
            <label for="email">Email</label><br>
            <input type="text" id="email" placeholder="&ThickSpace;&ThickSpace; you@exampale.com" required>
        </div>

        <div class="input">
            <label for="password">Password</label><br>
            <input type="password" id="password" placeholder="&ThickSpace;&ThickSpace; ********" required>
        </div>

        <div class="options">
            <input type="checkbox" id="remember">
            <label for="remember">Remember Me</label>

            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit">submit</button>

        <div class="signup">
            <p>Don't have an account? <a href="#">Sign Up</a></p>
        </div>

    </div>
</body>

</html>
